name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  application-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: pytest -q --cov=app --cov-report=term-missing
      - run: ruff check app tests alembic

  container-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e '.[dev,containers]'
      - run: RUN_CONTAINERS=1 pytest -q -m slow

  mutation-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/mutation.Dockerfile -t taskflow-mutation .
      - run: docker run --rm taskflow-mutation
